<!DOCTYPE html>
<html>
<head>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="style1.css">

</head>

<body>

<div class="container">

    <!-- Git logo -->

        <i class="fa-brands fa-linkedin"></i>
    </div>

</div>

</html>
